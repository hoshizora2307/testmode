<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>プリン星団を守れ！</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Klee+One:wght@600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #000;
    font-family: 'Klee One', serif;
    overflow: hidden;
    user-select: none;
    -webkit-user-select: none;
    width: 100vw;
    height: 100dvh;
  }
  #gameCanvas { 
    display: block; 
    position: fixed; 
    top: 0; left: 0;
    width: 100%; height: 100%;
    z-index: 1; 
    touch-action: none; 
  }
  #ui {
    position: fixed; inset: 0;
    pointer-events: none;
    z-index: 10;
  }
  #hud {
    position: absolute; top: 12px; left: 0; right: 0;
    display: flex; justify-content: space-between; align-items: center;
    padding: 0 12px;
    flex-wrap: wrap;
    gap: 6px;
  }
  .hud-box {
    background: rgba(10,6,30,0.72);
    border: 1.5px solid rgba(255,220,80,0.35);
    border-radius: 10px;
    padding: 4px 12px;
    color: #ffe87a;
    font-size: 1rem;
    letter-spacing: 1px;
    text-shadow: 0 0 8px rgba(255,220,80,0.5);
    white-space: nowrap;
    transition: transform 0.1s;
    display: flex;
    align-items: center;
  }
  .hud-box span { font-size: 1.3rem; font-weight: bold; margin-left: 6px; }
  .hud-time { color: #64ffb4; border-color: rgba(100,255,180,0.35); }
  .hud-time span { color: #fff; text-shadow: 0 0 8px #64ffb4; }
  #lifeBarContainer {
    width: 80px;
    height: 14px;
    background: rgba(0, 0, 0, 0.6);
    border: 1.5px solid rgba(255, 220, 80, 0.5);
    border-radius: 8px;
    margin-left: 8px;
    overflow: hidden;
    position: relative;
    box-shadow: inset 0 0 4px rgba(0,0,0,0.8);
  }
  #lifeBar {
    height: 100%;
    width: 100%;
    background: linear-gradient(90deg, #33ff66, #ccff00);
    box-shadow: 0 0 8px rgba(50,255,100,0.8);
    transition: width 0.2s ease-out, background 0.3s;
  }
  #energyBarContainer {
    width: 80px;
    height: 14px;
    background: rgba(0, 0, 0, 0.6);
    border: 1.5px solid rgba(255, 100, 200, 0.5);
    border-radius: 8px;
    margin-left: 8px;
    overflow: hidden;
    position: relative;
    box-shadow: inset 0 0 4px rgba(0,0,0,0.8);
  }
  #energyBar {
    height: 100%;
    width: 0%;
    background: linear-gradient(90deg, #ff99cc, #ff3366);
    box-shadow: 0 0 8px rgba(255,50,100,0.8);
    transition: width 0.2s ease-out;
  }
  #bossHUD {
    border-color: #ff3366;
    color: #ff3366;
  }
  #bossLifeBarContainer {
    width: 80px;
    height: 14px;
    background: rgba(0, 0, 0, 0.6);
    border: 1.5px solid #ff3366;
    border-radius: 8px;
    margin-left: 8px;
    overflow: hidden;
    position: relative;
    box-shadow: inset 0 0 4px rgba(0,0,0,0.8);
  }
  #bossLifeBar {
    height: 100%;
    width: 100%;
    background: linear-gradient(90deg, #ff3366, #ff6699);
    box-shadow: 0 0 8px rgba(255,50,100,0.8);
    transition: width 0.2s ease-out;
  }
  .screen {
    position: fixed; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: flex-start;
    background: radial-gradient(ellipse at 50% 60%, #0a0620 0%, #000 100%);
    z-index: 20;
    pointer-events: all;
    overflow-y: auto;
    padding: 40px 0;
  }
  .screen.hidden { display: none; }
  .game-title {
    font-size: clamp(2rem, 5vw, 3.2rem);
    font-weight: 900;
    color: #fff;
    text-shadow: 0 0 30px #ffd700, 0 0 60px #ff8c00;
    letter-spacing: 4px;
    margin-bottom: 4px;
    text-align: center;
  }
  .sub-title {
    font-size: 1.2rem; color: #aaa;
    letter-spacing: 3px; margin-bottom: 32px;
    text-align: center;
  }
  .player-img-lg {
    width: 120px; height: 120px;
    image-rendering: pixelated;
    filter: drop-shadow(0 0 24px rgba(255,200,50,0.8));
    animation: floatBig 2.4s ease-in-out infinite;
    margin-bottom: 24px;
    margin-top: 20px;
  }
  @keyframes floatBig {
    0%,100% { transform: translateY(0) rotate(-4deg); }
    50% { transform: translateY(-18px) rotate(4deg); }
  }
  .btn {
    background: linear-gradient(135deg, #ffd700, #ff8c00);
    color: #1a0a00; font-weight: 900;
    border: none; border-radius: 50px;
    padding: 14px 52px; font-size: 1.3rem;
    cursor: pointer; letter-spacing: 2px;
    box-shadow: 0 0 30px rgba(255,200,50,0.6);
    transition: transform 0.15s, box-shadow 0.15s;
    margin: 8px;
    pointer-events: all;
    font-family: 'Klee One', serif;
    flex-shrink: 0;
  }
  .btn:hover { transform: scale(1.08); box-shadow: 0 0 50px rgba(255,200,50,0.9); }
  .btn-secondary {
    background: transparent;
    border: 2px solid rgba(255,220,80,0.5);
    color: #ffe87a; border-radius: 50px;
    padding: 10px 36px; font-size: 1.1rem;
    cursor: pointer; letter-spacing: 2px;
    transition: all 0.15s; margin: 6px;
    pointer-events: all;
    font-family: 'Klee One', serif;
    flex-shrink: 0;
  }
  .btn-secondary:hover { background: rgba(255,220,80,0.1); border-color: #ffd700; }
  #rankPanel {
    background: rgba(10,6,30,0.95);
    border: 1.5px solid rgba(255,220,80,0.4);
    border-radius: 16px;
    padding: 24px 32px;
    min-width: 340px; max-width: 480px;
    width: 90%;
    margin: 16px 0;
    flex-shrink: 0;
  }
  .rank-title {
    color: #ffd700; font-size: 1.3rem; font-weight: bold;
    text-align: center; margin-bottom: 14px; letter-spacing: 3px;
    text-shadow: 0 0 10px rgba(255,200,50,0.6);
  }
  .rank-row {
    display: flex; justify-content: space-between; align-items: center;
    padding: 7px 0;
    border-bottom: 1px solid rgba(255,255,255,0.07);
    color: #eee; font-size: 1.1rem;
  }
  .rank-row:last-child { border-bottom: none; }
  .rank-num { color: #ffd700; font-weight: bold; min-width: 28px; }
  .rank-num.gold   { color: #FFD700; text-shadow: 0 0 8px #FFD700; font-size: 1.2rem; }
  .rank-num.silver { color: #C0C0C0; }
  .rank-num.bronze { color: #CD7F32; }
  .rank-name { flex: 1; padding: 0 10px; }
  .rank-score { color: #ffe87a; font-weight: bold; }
  .rank-empty { color: #555; text-align: center; padding: 20px 0; font-size: 1.1rem; }
  .go-score { font-size: 3rem; color: #ffd700; font-weight: 900;
    text-shadow: 0 0 30px #ffd700; margin: 12px 0; text-align: center; }
  .name-input {
    background: rgba(255,255,255,0.07);
    border: 2px solid rgba(255,220,80,0.5);
    border-radius: 10px;
    color: #fff; font-size: 1.4rem;
    padding: 10px 20px;
    text-align: center; width: 280px;
    outline: none; margin: 10px 0;
    letter-spacing: 2px;
    font-family: 'Klee One', serif;
  }
  .name-input:focus { border-color: #ffd700; }
  .name-hint { color: #888; font-size: 0.9rem; margin-bottom: 8px; text-align: center; }
  #controlsHint {
    position: fixed; bottom: 35px; left: 50%; transform: translateX(-50%);
    color: rgba(255,255,255,0.6); font-size: 1rem; letter-spacing: 1px;
    z-index: 11; pointer-events: none;
    text-align: center;
    width: 100%;
  }
  #levelBanner {
    position: fixed; top: 50%; left: 50%; transform: translate(-50%,-50%) scale(0.5);
    font-size: 3.5rem; font-weight: 900;
    color: #fff; text-shadow: 0 0 40px #ffd700, 0 0 80px #ff8c00;
    z-index: 15; pointer-events: none;
    opacity: 0; transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    text-align: center;
  }
  #levelBanner.show { opacity: 1; transform: translate(-50%,-50%) scale(1); }
  .item-overlay {
    position: fixed; inset: 0;
    display: flex; align-items: center; justify-content: center;
    z-index: 50; pointer-events: none;
    animation: overlayFade 2.2s forwards;
  }
  @keyframes overlayFade { 0% { opacity: 0; } 15% { opacity: 1; } 75% { opacity: 1; } 100% { opacity: 0; } }
  .item-popup {
    display: flex; flex-direction: column; align-items: center;
    background: rgba(5,5,20,0.88); border-radius: 22px; padding: 24px 36px 20px;
    box-shadow: 0 0 60px rgba(255,255,255,0.15); animation: popupZoom 2.2s forwards;
  }
  @keyframes popupZoom { 0% { transform: scale(0.3) rotate(-25deg); } 20% { transform: scale(1.18) rotate(8deg); } 35% { transform: scale(0.97) rotate(-3deg); } 50% { transform: scale(1.04) rotate(1deg); } 65% { transform: scale(1) rotate(0deg); } 85% { transform: scale(1) rotate(0deg); } 100% { transform: scale(0.7) rotate(15deg); } }
  .item-lemon { border: 2px solid rgba(255,230,80,0.7); }
  .item-mint  { border: 2px solid rgba(100,255,180,0.7); }
  .item-popup-img { height: 160px; width: auto; filter: drop-shadow(0 0 20px rgba(255,255,255,0.4)); animation: imgSpin 2.2s forwards; }
  @keyframes imgSpin { 0% { transform: rotate(-30deg) scale(0.4); } 30% { transform: rotate(15deg) scale(1.15); } 55% { transform: rotate(-5deg) scale(1); } 80% { transform: rotate(0deg) scale(1); } 100%{ transform: rotate(20deg) scale(0.5); } }
  .item-popup-label { font-size: 1.5rem; font-weight: 900; letter-spacing: 2px; margin-top: 10px; }
  .item-lemon .item-popup-label { color: #ffe840; text-shadow: 0 0 12px #ffe840; }
  .item-mint  .item-popup-label { color: #64ffb4; text-shadow: 0 0 12px #64ffb4; }
  .item-popup-effect { font-size: 1.8rem; font-weight: 900; color: #fff; text-shadow: 0 0 20px rgba(255,255,255,0.8); margin: 6px 0 4px; letter-spacing: 2px; }
  .damage-text {
    position: fixed; z-index: 100; pointer-events: none;
    font-size: 1.6rem; font-weight: 900;
    text-shadow: 0px 3px 0px rgba(0,0,0,0.8), 0 0 15px currentColor;
    animation: dmgFloat 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
  }
  @keyframes dmgFloat {
    0% { opacity: 1; transform: translate(-50%, -50%) scale(0.5); }
    30% { opacity: 1; transform: translate(-50%, -100%) scale(1.3); }
    100% { opacity: 0; transform: translate(-50%, -150%) scale(1); }
  }
  .credit {
    position: absolute; top: 10px; color: rgba(255,255,255,0.6);
    font-size: 0.9rem; letter-spacing: 2px; text-align: center;
    width: 100%; pointer-events: none;
  }
  #nameEntryArea {
    display: flex;
    flex-direction: column;
    align-items: center;
  }
</style>
</head>
<body>
<canvas id="bgCanvas"></canvas>
<canvas id="gameCanvas"></canvas>
<div id="ui">
  <div id="hud">
    <div class="hud-box" id="scoreBox">SCORE <span id="scoreVal">0</span></div>
    <div class="hud-box">LEVEL <span id="levelVal">1</span></div>
    <div class="hud-box hud-time">TIME <span id="timeVal">30</span></div>
    <div class="hud-box">
      LIFE
      <div id="lifeBarContainer">
        <div id="lifeBar"></div>
      </div>
    </div>
    <div class="hud-box">
      ENERGY
      <div id="energyBarContainer">
        <div id="energyBar"></div>
      </div>
    </div>
    <div class="hud-box" id="bossHUD" style="display: none;">
      BOSS
      <div id="bossLifeBarContainer">
        <div id="bossLifeBar"></div>
      </div>
    </div>
  </div>
</div>
<div id="levelBanner">STAGE CLEAR!</div>
<div id="controlsHint">画面をスワイプして移動（オート連射）</div>
<div class="screen" id="titleScreen">
  <div class="credit">製作：MONDOCOLO STUDIO</div>
  <img src="star_3_sparkle.png" class="player-img-lg" alt="" onerror="this.onerror=null; this.src='star_2_open.png'">
  <div class="game-title">プリン星団を守れ！</div>
  <div class="sub-title">プリン星団からやってきたプリンAスター</div>
  <button class="btn" onclick="startGame()">ゲームスタート</button>
  <button class="btn-secondary" onclick="showRanking()">🏆 ランキング</button>
  <div id="rankPanel">
    <div class="rank-title">🏆 TOP 10 ランキング</div>
    <div id="rankListTitle"><div class="rank-empty">読み込み中...</div></div>
  </div>
</div>
<div class="screen hidden" id="rankingScreen">
  <div class="game-title" style="font-size:2.5rem; margin-top:20px;">🏆 ランキング</div>
  <div id="rankPanel">
    <div class="rank-title">TOP 10</div>
    <div id="rankListFull"><div class="rank-empty">読み込み中...</div></div>
  </div>
  <button class="btn-secondary" onclick="hideRanking()" style="margin-bottom: 40px;">← 戻る</button>
</div>
<div class="screen hidden" id="gameOverScreen">
  <div class="game-title" style="font-size:2.8rem; color:#ff6b6b; text-shadow:0 0 30px #ff0000; margin-top:20px;">GAME OVER</div>
  <div style="color:#aaa; margin:6px 0 2px; letter-spacing:2px; font-size:1.2rem;">YOUR SCORE</div>
  <div class="go-score" id="finalScore">0</div>
  <div id="nameEntryArea">
    <div id="nameInputWrapper">
      <div style="color:#ffe87a; margin-bottom:8px; font-size:1.2rem; text-align: center;">名前を入力してランキングに登録！</div>
      <div class="name-hint">最大8文字</div>
      <input class="name-input" id="playerNameInput" type="text" maxlength="8" placeholder="プレイヤー名" autocomplete="off">
      <br>
      <button class="btn" id="submitBtn" onclick="submitScore()">登録する</button>
      <button class="btn-secondary" id="skipBtn" onclick="skipSubmit()">登録しない</button>
    </div>
    <div id="submitMsg" style="color:#ffe87a; margin-top:8px; min-height:24px; font-size:1.2rem; text-align: center;"></div>
  </div>
  <div id="postSubmitArea" style="display: none; margin-top: 10px; text-align: center;">
    <button class="btn" onclick="startGame()">もう一度プレイ</button>
    <br>
    <button class="btn-secondary" onclick="hideRanking()">タイトルへ戻る</button>
  </div>
  <div id="rankPanel" style="margin-bottom: 40px;">
    <div class="rank-title">🏆 TOP 10</div>
    <div id="rankListGO"><div class="rank-empty">読み込み中...</div></div>
  </div>
</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
var keys = {};
var gameState = 'title'; 
var score = 0;
var maxLives = 3;
var lives = 3;
var level = 1;
var frameCount = 0;
var lastShotFrame = 0;
var lastEnemyFrame = 0;
var scoreMultiplier = 1;
var animId = null;
var stageTime = 30.0;
var lastTime = 0;
var shakeTime = 0;
var shakeMag = 0;
var hitStop = 0;
var warpFactor = 0;
var invincibleTime = 0; 
var puddingEnergy = 0;
var laserTime = 0;
var boss = null;
var bossHp = 20;
var bossMaxHp = 20;
var bossMoveDir = 1;
var SUPABASE_URL = 'https://ufjojhraqyzqqzlkokwd.supabase.co';
var SUPABASE_KEY = 'sb_publishable_ha-q_6WBEngyBT3dOLMJQQ_EZsVSGI6';
var supabaseClient = null;
try {
  if (window.supabase) {
    supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
  }
} catch (e) {}
async function loadRanking() {
  try {
    if (supabaseClient) {
      const { data, error } = await supabaseClient
        .from('purin_ranking')
        .select('name, score')
        .order('score', { ascending: false })
        .limit(10);
      if (!error && data) return data;
    }
  } catch(e) {}
  try {
    const localData = localStorage.getItem("purin_ranking_v1");
    return localData ? JSON.parse(localData) : [];
  } catch (err) {
    return [];
  }
}
async function addScore(name, pts) {
  const playerName = name.trim() || '匿名スター';
  try {
    if (supabaseClient) {
      const { error } = await supabaseClient
        .from('purin_ranking')
        .insert([{ name: playerName, score: pts }]);
      if (!error) return await loadRanking();
    }
  } catch(e) {}
  try {
    let list = await loadRanking();
    list.push({ name: playerName, score: pts, date: new Date().toLocaleDateString('ja-JP') });
    list.sort((a,b) => b.score - a.score);
    list = list.slice(0, 10);
    localStorage.setItem("purin_ranking_v1", JSON.stringify(list));
    return list;
  } catch(err) {
    return [];
  }
}
function medal(rank) {
  if (rank === 0) return '<span class="rank-num gold">🥇</span>';
  if (rank === 1) return '<span class="rank-num silver">🥈</span>';
  if (rank === 2) return '<span class="rank-num bronze">🥉</span>';
  return `<span class="rank-num">${rank+1}</span>`;
}
function renderRanking(list, containerId) {
  const el = document.getElementById(containerId);
  if (!el) return;
  if (!list || list.length === 0) {
    el.innerHTML = '<div class="rank-empty">まだ記録がありません。<br>あなたが1位に！</div>';
    return;
  }
  el.innerHTML = list.map((r, i) => `
    <div class="rank-row">
      ${medal(i)}
      <span class="rank-name">${escHtml(r.name)}</span>
      <span class="rank-score">${r.score.toLocaleString()}</span>
    </div>`).join('');
}
function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
async function refreshRanking() {
  try {
    const list = await loadRanking();
    renderRanking(list, 'rankListTitle');
    renderRanking(list, 'rankListFull');
    renderRanking(list, 'rankListGO');
  } catch (e) {
    renderRanking([], 'rankListTitle');
    renderRanking([], 'rankListFull');
    renderRanking([], 'rankListGO');
  }
}
function showScreen(id) {
  ['titleScreen','rankingScreen','gameOverScreen'].forEach(s => {
    document.getElementById(s).classList.toggle('hidden', s !== id);
  });
}
window.showRanking = function() { showScreen('rankingScreen'); refreshRanking(); }
window.hideRanking = function() { showScreen('titleScreen'); }
window.startGame = function() {
  showScreen(null);
  document.getElementById('titleScreen').classList.add('hidden');
  document.getElementById('rankingScreen').classList.add('hidden');
  document.getElementById('gameOverScreen').classList.add('hidden');
  score = 0; 
  lives = maxLives;
  level = 1; frameCount = 0;
  lastShotFrame = 0; lastEnemyFrame = 0; scoreMultiplier = 1;
  stageTime = 30.0; lastTime = 0;
  warpFactor = 0; ambLight.color.setHex(0x8888cc); 
  invincibleTime = 0;
  puddingEnergy = 0;
  laserTime = 0;
  document.getElementById('scoreVal').textContent = '0';
  document.getElementById('levelVal').textContent = '1';
  document.getElementById('timeVal').textContent = '30';
  document.getElementById('energyBar').style.width = '0%';
  updateLivesUI();
  clearScene();
  createPlayer();
  gameState = 'playing';
}
window.submitScore = async function() {
  const name = document.getElementById('playerNameInput').value.trim() || '匿名スター';
  document.getElementById('submitBtn').disabled = true;
  document.getElementById('skipBtn').disabled = true;
  document.getElementById('submitMsg').textContent = '登録中...';
  try {
    const list = await addScore(name, score);
    renderRanking(list, 'rankListGO');
    document.getElementById('nameInputWrapper').style.display = 'none';
    document.getElementById('submitMsg').textContent = '✅ 登録しました！';
    document.getElementById('postSubmitArea').style.display = 'block';
    renderRanking(list, 'rankListTitle');
  } catch(e) {
    document.getElementById('submitMsg').textContent = '⚠️ 登録に失敗しました';
    document.getElementById('submitBtn').disabled = false;
    document.getElementById('skipBtn').disabled = false;
  }
}
window.skipSubmit = async function() {
  document.getElementById('nameInputWrapper').style.display = 'none';
  document.getElementById('submitMsg').textContent = '';
  document.getElementById('postSubmitArea').style.display = 'block';
  await refreshRanking();
}
var bgCanvas = document.getElementById('bgCanvas');
var bgCtx = bgCanvas.getContext('2d');
var bgStars = [];
function initBg() {
  bgCanvas.width = window.innerWidth;
  bgCanvas.height = window.innerHeight;
  bgStars = Array.from({length: 200}, () => ({
    x: Math.random() * bgCanvas.width,
    y: Math.random() * bgCanvas.height,
    r: Math.random() * 1.5 + 0.3,
    s: Math.random() * 0.3 + 0.1,
    a: Math.random()
  }));
}
function drawBg(t) {
  bgCtx.fillStyle = warpFactor > 0.1 ? 'rgba(0, 0, 0, 0.3)' : '#000';
  bgCtx.fillRect(0,0,bgCanvas.width,bgCanvas.height);
  for (const star of bgStars) {
    star.y += (0.5 + star.s) * (1 + warpFactor * 40);
    if (star.y > bgCanvas.height) {
      star.y = 0;
      star.x = Math.random() * bgCanvas.width;
    }
    bgCtx.beginPath();
    if (warpFactor > 0.1) {
      bgCtx.moveTo(star.x, star.y);
      bgCtx.lineTo(star.x, star.y - (0.5 + star.s) * warpFactor * 40);
      bgCtx.lineWidth = star.r;
      bgCtx.strokeStyle = `rgba(255,255,240,${star.a})`;
      bgCtx.stroke();
    } else {
      star.a = 0.4 + 0.6 * (Math.sin(t * star.s + star.x) * 0.5 + 0.5);
      bgCtx.arc(star.x, star.y, star.r, 0, Math.PI*2);

        document.getElementById('bossHUD').style.display = 'flex';
        document.getElementById('bossLifeBar').style.width = '100%';
        var mat = new THREE.SpriteMaterial({ map: mimiTexture, transparent: true });
        boss = new THREE.Sprite(mat);
        boss.scale.set(250, 250, 1);
        boss.position.set(0, H()/2 - 160, 1);
        scene.add(boss);
      } else {
        level++;
        stageTime = 30.0;
        scoreMultiplier = 1 + (level-1) * 0.2;
        document.getElementById('levelVal').textContent = level;
        showLevelBanner();
      }
    }
  }
  document.getElementById('timeVal').textContent = Math.ceil(stageTime);
  if (gameState === 'boss' && boss) {
    boss.position.x += bossMoveDir * (2 + level * 0.2);
    if (boss.position.x > W()/2 - 150) { boss.position.x = W()/2 - 150; bossMoveDir = -1; }
    if (boss.position.x < -W()/2 + 150) { boss.position.x = -W()/2 + 150; bossMoveDir = 1; }
    if (frameCount % 45 === 0) {
      var mat = new THREE.SpriteMaterial({ map: heartTexture, transparent: true });
      var sprite = new THREE.Sprite(mat);
      sprite.scale.set(40, 40, 1);
      sprite.position.set(boss.position.x, boss.position.y - 50, 2);
      scene.add(sprite);
      var vx = 0;
      if (player) {
        var dx = player.position.x - boss.position.x;
        var dy = player.position.y - boss.position.y;
        var dist = Math.sqrt(dx*dx + dy*dy);
        vx = (dx / dist) * 6;
      }
      enemyBullets.push({ mesh: sprite, vx: vx, vy: -6 });
    }
  }
  if (laserTime > 0) {
    laserTime--;
    puddingEnergy = (laserTime / 1200) * 100;
    document.getElementById('energyBar').style.width = puddingEnergy + '%';
  }
  if (invincibleTime > 0) {
    invincibleTime--;
    if (player) {
      player.material.opacity = (invincibleTime % 10 < 5) ? 0.2 : 1.0;
    }
  } else if (player) {
    player.material.opacity = 1.0;
  }
  if (player) {
    var spd = (PLAYER_SPEED + level * 0.2) * speedBoost;
    if ((keys['ArrowLeft'] || keys['a']) && player.position.x > -W()/2 + 40) player.position.x -= spd;
    if ((keys['ArrowRight'] || keys['d']) && player.position.x < W()/2 - 40) player.position.x += spd;
    shoot();
    player.material.rotation = (keys['ArrowLeft'] ? -0.25 : keys['ArrowRight'] ? 0.25 : 0);
  }
  updateBullets();
  updateEnemies();
  updateItems();
  checkCollisions();
  renderer.render(scene, camera);
}
window.addEventListener('keydown', e => {
  keys[e.key] = true;
  if (e.key === ' ') e.preventDefault();
});
window.addEventListener('keyup', e => { keys[e.key] = false; });
function handleTouchMove(e) {
  if ((gameState !== 'playing' && gameState !== 'boss') || !player) return;
  e.preventDefault(); 
  var touch = e.touches[0];
  var rect = canvas.getBoundingClientRect();
  var screenX = touch.clientX - rect.left;
  var worldX = (screenX / rect.width) * W() - W() / 2;
  player.position.x = Math.max(-W()/2 + 40, Math.min(W()/2 - 40, worldX));
}
canvas.addEventListener('touchstart', handleTouchMove, { passive: false });
canvas.addEventListener('touchmove', handleTouchMove, { passive: false });
initBg();
refreshRanking();
showScreen('titleScreen');
requestAnimationFrame(gameLoop);
</script>
</body>
</html>
